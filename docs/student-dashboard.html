<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PRAJNA · Student Intelligence Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0f0f1a;--sf:#161628;--sf2:#1e1e35;--bd:#2a2a48;--acc:#7c3aed;--acc2:#a855f7;--green:#22c55e;--yel:#f59e0b;--org:#f97316;--red:#ef4444;--lime:#84cc16;--tx:#e2e8f0;--mt:#94a3b8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Inter',system-ui,sans-serif;min-height:100vh}
.nav{display:flex;align-items:center;gap:16px;padding:14px 24px;background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.nav-logo{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,#7c3aed,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-badge{background:#7c3aed22;color:#a855f7;border:1px solid #7c3aed55;border-radius:20px;padding:2px 10px;font-size:.72rem;font-weight:600;letter-spacing:.5px}
.nav-back{margin-left:auto;font-size:.82rem;color:var(--mt);border:1px solid var(--bd);padding:5px 14px;border-radius:8px;cursor:pointer;transition:.2s;text-decoration:none}
.nav-back:hover{border-color:#7c3aed;color:#a855f7}
.shell{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 57px)}
/* student role — no sidebar at all */
body[data-role=student] .shell{grid-template-columns:1fr}
body[data-role=student] .sidebar{display:none!important}
body[data-role=student] #nav-org{display:none!important}
body[data-role=student] .exam-toggle{display:none!important}
/* focused mode — came from org-dashboard with ?id= param */
body[data-focused=true] .shell{grid-template-columns:1fr}
body[data-focused=true] .sidebar{display:none!important}
body[data-focused=true] .exam-toggle{display:none!important}
body[data-focused=true] #nav-org{display:none!important}
.sidebar{background:var(--sf);border-right:1px solid var(--bd);padding:20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.sb-head{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mt)}
.exam-toggle{display:flex;border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.exam-toggle button{flex:1;padding:8px;border:none;cursor:pointer;font-size:.82rem;font-weight:600;transition:.2s}
.exam-toggle button.active{background:var(--acc);color:#fff}
.exam-toggle button:not(.active){background:transparent;color:var(--mt)}
.search-box{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;color:var(--tx);font-size:.84rem;outline:none}
.search-box:focus{border-color:#7c3aed}
.stu-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.stu-item{padding:9px 12px;border-radius:8px;cursor:pointer;transition:.15s;border:1px solid transparent}
.stu-item:hover{background:var(--sf2);border-color:var(--bd)}
.stu-item.active{background:#7c3aed22;border-color:#7c3aed55}
.stu-name{font-size:.84rem;font-weight:600}
.stu-meta{font-size:.73rem;color:var(--mt);margin-top:2px}
.stu-pct{font-size:.68rem;font-weight:700;padding:1px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
.main{padding:24px;overflow-y:auto}
.dash{display:flex;flex-direction:column;gap:18px}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:18px}
.card-title{font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mt);margin-bottom:14px}
.hero-bar{background:linear-gradient(135deg,#1e1040,#1a1a35);border:1px solid #7c3aed44;border-radius:12px;padding:20px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.hero-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:#fff;flex-shrink:0}
.hero-info{flex:1}
.hero-name{font-size:1.25rem;font-weight:800}
.hero-meta{font-size:.81rem;color:var(--mt);margin-top:3px}
.hero-stats{display:flex;gap:18px;flex-wrap:wrap}
.hstat{text-align:center}
.hstat-val{font-size:1.5rem;font-weight:800;line-height:1}
.hstat-lbl{font-size:.68rem;color:var(--mt);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.mc{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:14px;text-align:center}
.mc-val{font-size:1.75rem;font-weight:800;line-height:1}
.mc-lbl{font-size:.7rem;color:var(--mt);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.mc-sub{font-size:.74rem;color:var(--mt);margin-top:4px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three-col{display:grid;grid-template-columns:300px 1fr;gap:16px}
.ch-wrap{height:270px;position:relative}
.focus-list{display:flex;flex-direction:column;gap:8px}
.fi{background:var(--sf2);border-radius:8px;padding:12px;border-left:3px solid var(--acc)}
.fi-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.fi-chapter{font-weight:700;font-size:.88rem}
.fi-score{font-size:.73rem;font-weight:700;padding:2px 8px;border-radius:12px;background:#7c3aed22;color:#a855f7}
.fi-bars{display:flex;gap:8px}
.fi-bar{flex:1}
.fi-bar-lbl{font-size:.72rem;color:var(--mt);margin-bottom:3px}
.fi-bar-track{height:5px;background:#ffffff1a;border-radius:3px;overflow:hidden}
.fi-bar-fill{height:100%;border-radius:3px}
.zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.zone-list{display:flex;flex-direction:column;gap:6px}
.zone-h{font-size:.78rem;font-weight:700;margin-bottom:10px}
.zi{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--sf2);border-radius:8px}
.zi-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.zi-text{flex:1;min-width:0}
.zi-ch{font-size:.83rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.zi-acc{font-size:.73rem;color:var(--mt)}
.zi-badge{font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
/* ── Chapter Performance Panel (replaces heatmap) ── */
.chperf-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-top:4px}
.chperf-subj{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.chperf-subj-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer;user-select:none}
.chperf-subj-title{font-size:.8rem;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.chperf-subj-meta{font-size:.72rem;color:var(--mt)}
.chperf-subj-chevron{font-size:.8rem;color:var(--mt);transition:transform .2s}
.chperf-subj-body{padding:8px 14px 12px}
.chperf-row{display:flex;align-items:center;gap:10px;padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.04)}
.chperf-row:last-child{border-bottom:none}
.chperf-name{font-size:.78rem;font-weight:500;flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chperf-bar-wrap{width:90px;height:6px;background:rgba(255,255,255,.08);
  border-radius:3px;flex-shrink:0}
.chperf-bar{height:6px;border-radius:3px;transition:width .4s}
.chperf-pct{font-size:.75rem;font-weight:700;min-width:34px;text-align:right;flex-shrink:0}
.chperf-badge{font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:8px;
  flex-shrink:0;white-space:nowrap}
.chperf-trend{font-size:.78rem;flex-shrink:0;min-width:14px}
.insight-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.ins-chip{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:12px}
.ins-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mt);margin-bottom:6px}
.ins-txt{font-size:.81rem;line-height:1.55;color:var(--tx)}
.ins-strong{color:#a855f7;font-weight:700}
.loading{display:flex;align-items:center;justify-content:center;height:300px;flex-direction:column;gap:14px;color:var(--mt)}
/* DEEP ANALYSIS */
.deep-section{margin-top:4px}
.deep-summary{background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(139,92,246,.06));
  border:1px solid rgba(99,102,241,.25);border-radius:12px;padding:18px 22px;margin-bottom:14px}
.deep-summary-title{font-size:.82rem;font-weight:800;color:#a5b4fc;margin-bottom:10px;letter-spacing:.3px}
.deep-summary-counts{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.deep-cnt{font-size:.78rem;font-weight:700;display:flex;align-items:center;gap:5px}
.deep-actions{font-size:.76rem;color:var(--tx);line-height:1.6}
.deep-actions li{margin:3px 0;list-style:none;padding-left:4px}
.deep-actions li::before{content:'→ ';color:var(--mt)}
.deep-subj{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;margin-bottom:8px;overflow:hidden}
.deep-subj>summary{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;
  list-style:none;user-select:none;font-weight:700;font-size:.82rem;transition:background .15s}
.deep-subj>summary:hover{background:rgba(255,255,255,.02)}
.deep-subj>summary::-webkit-details-marker{display:none}
.deep-subj-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.deep-subj-meta{font-size:.68rem;font-weight:400;color:var(--mt);margin-left:auto}
.deep-subj-body{padding:0 12px 12px}
.deep-ch{background:var(--bg);border:1px solid var(--bd);border-radius:8px;margin-bottom:6px;overflow:hidden}
.deep-ch>summary{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;
  list-style:none;font-size:.78rem;transition:background .15s}
.deep-ch>summary:hover{background:rgba(255,255,255,.025)}
.deep-ch>summary::-webkit-details-marker{display:none}
.deep-ch-name{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.deep-ch-prob{font-size:.75rem;font-weight:700;flex-shrink:0}
.deep-ch-meta{font-size:.65rem;color:var(--mt);flex-shrink:0;white-space:nowrap}
.deep-ch-body{padding:6px 14px 10px;border-top:1px solid var(--bd)}
.deep-ch-signals{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.deep-sig{font-size:.64rem;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.05);color:var(--mt)}
.deep-sig strong{color:var(--tx)}
.deep-micro{display:flex;align-items:center;gap:8px;padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.04);font-size:.76rem}
.deep-micro:last-child{border-bottom:none}
.deep-micro-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--tx)}
.deep-micro-acc{min-width:36px;text-align:right;font-weight:600;flex-shrink:0}
.deep-micro-prob{min-width:36px;text-align:right;font-weight:600;flex-shrink:0;color:var(--mt)}
.deep-micro-roi{font-size:.62rem;min-width:20px;text-align:right;font-weight:800;flex-shrink:0}
.roi-crit{color:#ff6b6b}.roi-focus{color:#f59e0b}.roi-review{color:#818cf8}.roi-ok{color:#22c55e}
.spinner{width:32px;height:32px;border:3px solid var(--bd);border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-msg{padding:20px;color:var(--mt);text-align:center;font-size:.84rem}
.note{font-size:.73rem;color:var(--mt);margin-bottom:10px}
/* ── Intelligence panel ── */
.intel-card{background:linear-gradient(135deg,#0f0f28,#12122a);border:1px solid #4f46e540;border-radius:12px;padding:18px}
.intel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.intel-status{display:flex;align-items:center;gap:6px;font-size:.73rem}
.idot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;animation:pulse 2s infinite;flex-shrink:0}
.idot.off{background:#ef4444;box-shadow:0 0 6px #ef4444;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.intel-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:900px){.intel-grid{grid-template-columns:1fr}}
.intel-topic{display:flex;align-items:center;gap:8px;padding:9px 11px;background:#ffffff06;border:1px solid #ffffff0a;border-radius:8px;transition:.15s}
.intel-topic:hover{border-color:#4f46e540;background:#4f46e510}
.it-rank{font-size:.7rem;font-family:monospace;color:var(--mt);min-width:22px;text-align:right}
.it-info{flex:1;min-width:0}
.it-name{font-size:.82rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.it-sub{font-size:.7rem;color:var(--mt);margin-top:1px}
.it-urgency{font-size:.64rem;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;white-space:nowrap}
.u-critical{background:#ef444430;color:#f87171}
.u-high{background:#f59e0b30;color:#fbbf24}
.u-medium{background:#6366f130;color:#818cf8}
.u-low{background:#ffffff12;color:var(--mt)}
.it-score{font-size:.72rem;font-family:monospace;color:var(--mt)}
.match-badge{font-size:.65rem;font-weight:700;padding:2px 6px;border-radius:8px;background:#a855f730;color:#c084fc;margin-left:4px}
/* ── Progress bar ── */
.prog-wrap{height:6px;background:#ffffff12;border-radius:4px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1)}
/* ── Copilot ── */
.cp-card{background:linear-gradient(135deg,#0f1a1a,#0d1a24);border:1px solid #06b6d430;border-radius:12px;padding:18px}
.cp-row{display:flex;gap:8px}
.cp-input{flex:1;background:#ffffff08;border:1px solid #ffffff12;color:var(--tx);padding:9px 14px;border-radius:8px;font-size:.84rem;font-family:inherit;outline:none;transition:.2s}
.cp-input:focus{border-color:#06b6d4}
.cp-btn{background:#06b6d4;color:#000;font-weight:700;font-size:.82rem;padding:9px 18px;border:none;border-radius:8px;cursor:pointer;transition:.2s;white-space:nowrap;font-family:inherit}
.cp-btn:hover{background:#0891b2}
.cp-answer{margin-top:12px;padding:12px 14px;background:#06b6d415;border:1px solid #06b6d430;border-radius:8px;font-size:.83rem;line-height:1.7;white-space:pre-wrap;display:none}
.cp-meta{margin-top:6px;font-size:.72rem;color:var(--mt);display:none}
.cp-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.cp-pill{font-size:.73rem;padding:4px 10px;border-radius:16px;background:#ffffff08;border:1px solid #ffffff10;color:var(--mt);cursor:pointer;transition:.15s}
.cp-pill:hover{border-color:#06b6d440;color:var(--tx)}
/* ── Full Subject-Wise Guide ── */
.guide-toggle{width:100%;margin-top:10px;padding:10px 14px;background:#7c3aed18;
  border:1px dashed #7c3aed55;border-radius:8px;cursor:pointer;color:#a855f7;
  font-size:.84rem;font-weight:600;font-family:inherit;text-align:left;transition:.2s}
.guide-toggle:hover{background:#7c3aed28;border-color:#a855f7}
.guide-section{display:none;flex-direction:column;gap:10px;padding:4px 0 8px}
.guide-subj{background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.guide-subj-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;
  cursor:pointer;user-select:none;border-bottom:1px solid var(--bd)}
.guide-subj-hdr:hover{background:rgba(255,255,255,.02)}
.guide-subj-urgency{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.guide-subj-name{font-size:.88rem;font-weight:700;flex:1}
.guide-subj-meta{font-size:.73rem;color:var(--mt)}
.guide-subj-chev{font-size:.8rem;color:var(--mt);transition:transform .2s;margin-left:4px}
.guide-subj-body{display:none;padding:0 14px 12px}
.guide-subj-body.open{display:block}
.guide-ch-row{display:flex;align-items:center;gap:10px;padding:8px 4px;
  border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;border-radius:6px;
  transition:background .15s}
.guide-ch-row:hover{background:rgba(255,255,255,.03)}
.guide-ch-row:last-of-type{border-bottom:none}
.guide-ch-rank{font-size:.7rem;color:var(--mt);min-width:24px;text-align:right;font-family:monospace}
.guide-ch-name{flex:1;min-width:0;font-size:.83rem;font-weight:500;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.guide-ch-bars{display:flex;flex-direction:column;gap:3px;width:80px;flex-shrink:0}
.guide-ch-bar-row{display:flex;align-items:center;gap:5px}
.guide-ch-bar-track{flex:1;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.guide-ch-bar-fill{height:4px;border-radius:2px;transition:width .4s}
.guide-ch-badge{font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:8px;
  flex-shrink:0;white-space:nowrap}
.guide-ch-chev{font-size:.8rem;color:var(--mt);flex-shrink:0;transition:transform .2s}
.guide-ch-detail{display:none;margin:4px 0 8px 34px;padding:12px;
  background:#ffffff05;border:1px solid rgba(255,255,255,.08);border-radius:10px}
.guide-detail-top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.guide-detail-stat{text-align:center;padding:8px;background:rgba(255,255,255,.04);border-radius:8px}
.guide-detail-stat-val{font-size:.95rem;font-weight:700}
.guide-detail-stat-lbl{font-size:.68rem;color:var(--mt);margin-top:2px}
.guide-micros{margin-bottom:8px}
.guide-micro-label{font-size:.72rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.5px;color:var(--mt);margin-bottom:6px}
.guide-micro-list{display:flex;flex-wrap:wrap;gap:6px}
.guide-micro-chip{font-size:.76rem;padding:3px 9px;border-radius:12px;
  background:#6366f115;border:1px solid #6366f130;color:#a5b4fc}
.guide-strategy{padding:10px 12px;background:#7c3aed10;border:1px solid #7c3aed25;
  border-radius:8px;font-size:.81rem;line-height:1.6;color:var(--tx)}
.guide-qlink{display:inline-block;margin-top:8px;font-size:.78rem;color:#06b6d4;
  cursor:pointer;border-bottom:1px solid transparent;transition:.15s;text-decoration:none}
.guide-qlink:hover{border-color:#06b6d4}
/* ── Predictions Panel ── */
.pred-card{background:linear-gradient(135deg,#080820,#080d1a);border:1px solid #6366f140;border-radius:12px;padding:18px}
.pred-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:8px}
.pred-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.pred-tab{padding:4px 12px;border:1px solid transparent;border-radius:6px;background:none;color:var(--mt);font-size:.75rem;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.pred-tab.active{background:#6366f122;border-color:#6366f155;color:#818cf8}
.pred-tab:hover:not(.active){color:var(--tx);border-color:#ffffff20}
.pred-col-hdr{display:grid;grid-template-columns:1fr 90px 52px 80px;gap:8px;padding:0 10px 6px;border-bottom:1px solid #ffffff08;margin-bottom:4px}
.pred-col-lbl{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mt)}
.pred-list{display:flex;flex-direction:column;gap:4px}
.pred-row{display:grid;grid-template-columns:1fr 90px 52px 80px;align-items:center;gap:8px;padding:8px 10px;background:#ffffff04;border:1px solid #ffffff06;border-radius:8px;transition:.15s}
.pred-row:hover{background:#6366f108;border-color:#6366f128}
.pred-row.match{border-color:#a855f740;background:#a855f708}
.pred-chapter{min-width:0}
.pred-ch-name{font-size:.81rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pred-ch-sub{font-size:.68rem;color:var(--mt);margin-top:1px}
.pred-prob-col{display:flex;flex-direction:column;gap:3px}
.pred-prob-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.pred-prob-fill{height:100%;border-radius:2px;width:0;transition:width .8s cubic-bezier(.4,0,.2,1)}
.pred-prob-pct{font-size:.71rem;font-weight:700}
.pred-qs{font-size:.71rem;color:var(--mt);text-align:center}
.pred-trend{font-size:.7rem;font-weight:700;text-align:center}

/* ── DOM helpers (no innerHTML for dynamic content) ── */
function el(tag,cls){ const e=document.createElement(tag); if(cls)e.className=cls; return e; }
function txt(t){ return document.createTextNode(t); }
function mkCard(titleText){
  const c=el('div','card');
  const h=el('div','card-title'); h.appendChild(txt(titleText)); c.appendChild(h);
  return c;
}
function setStyle(e,css){ Object.assign(e.style,css); return e; }

/* ── Data loading ── */
async function loadData(exam){
  if(G.data[exam]) return G.data[exam];
  showLoading('Loading student data…');
  try{
    const r=await AUTH.apiFetch('/api/students?exam='+exam);
    if(r.ok){ G.data[exam]=await r.json(); return G.data[exam]; }
  }catch(err){}
  // Fallback: load static JSON directly (works on Vercel without backend)
  try{
    const r2=await fetch('student_summary_'+exam+'.json');
    if(r2.ok){ G.data[exam]=await r2.json(); return G.data[exam]; }
  }catch(err2){}
  showLoading('Could not load data. Ensure the backend or static JSON files are available.',true);
  return null;
}

function showLoading(msg,err){
  document.getElementById('loading-msg').style.display='flex';
  document.getElementById('dash').style.display='none';
  const ld=document.getElementById('loading-msg');
  ld.textContent='';
  if(!err){ const sp=el('div','spinner'); ld.appendChild(sp); }
  const s=el('span');
  s.appendChild(txt(msg));
  if(err) s.style.color='#ef4444';
  ld.appendChild(s);
}

document.getElementById('btn-neet').addEventListener('click',()=>switchExam('neet'));
document.getElementById('btn-jee').addEventListener('click', ()=>switchExam('jee'));

function switchExam(exam){
  G.exam=exam; G.stu=null;
  document.getElementById('btn-neet').className=exam==='neet'?'active':'';
  document.getElementById('btn-jee').className=exam==='jee'?'active':'';
  loadData(exam).then(data=>{ if(!data)return; buildList(data.students); pick(data.students[0]); });

/* ── Student list (collapsed by default, toggle to reveal) ── */
let _stuListOpen = false;

function toggleStudentList(forceOpen){
  const list   = document.getElementById('stu-list');
  const toggle = document.getElementById('stu-list-toggle');
  _stuListOpen = forceOpen !== undefined ? forceOpen : !_stuListOpen;
  if(_stuListOpen){
    list.style.display    = 'flex';
    list.style.maxHeight  = '9999px';
    toggle.style.transform= 'rotate(90deg)';
  } else {
    list.style.maxHeight  = '0';
    list.style.overflow   = 'hidden';
    setTimeout(()=>{ if(!_stuListOpen) list.style.display='none'; }, 300);
    toggle.style.transform= 'rotate(0deg)';
  }
}

/* ── Student list builder with virtual paging ── */
const PAGE_SIZE = 30;  // students visible without searching
let _allStudents = [];

function buildList(students){
  _allStudents = students;
  const list=document.getElementById('stu-list');
  const head=document.getElementById('stu-list-head');
  list.textContent='';
  head.querySelector('span:first-child').textContent='Students ('+students.length+')';
  _renderStudents('', students);
}

function _renderStudents(query, students){
  const list=document.getElementById('stu-list');
  list.textContent='';

  const lq=query.trim().toLowerCase();
  const matched = lq
    ? students.filter(s=>(s.name+' '+s.id+' '+(s.erpid||'')+' '+s.city).toLowerCase().includes(lq))
    : students;

  // Show all when searching; cap at PAGE_SIZE when idle
  const visible = lq ? matched : matched.slice(0, PAGE_SIZE);

  visible.forEach(s=>{
    const pct=(s.metrics.latest_percentage||0);
    const lv=pctLevel(pct);
    const div=el('div','stu-item');
    div.dataset.sid=s.id;
    div.dataset.q=(s.name+' '+s.id+' '+(s.erpid||'')+' '+s.city).toLowerCase();

    const nameRow=el('div','stu-name');
    nameRow.appendChild(txt(s.name));
    const badge=el('span','stu-pct');
    badge.style.background=lColor(lv)+'22';
    badge.style.color=lColor(lv);
    badge.appendChild(txt(pct.toFixed(0)+'%'));
    nameRow.appendChild(badge);

    const meta=el('div','stu-meta');
    meta.appendChild(txt((s.erpid||s.id)+' · '+s.city));

    div.appendChild(nameRow);
    div.appendChild(meta);
    div.addEventListener('click',()=>pick(s));
    list.appendChild(div);
  });

  // "Show more" row when capped
  if(!lq && matched.length > PAGE_SIZE){
    const more=el('div');
    more.style.cssText='padding:8px 14px;font-size:.72rem;color:#6366f1;cursor:pointer;text-align:center;border-top:1px solid rgba(255,255,255,.05)';
    more.appendChild(txt('Show all '+matched.length+' students ▾'));
    more.addEventListener('click',()=>_renderStudents('__all__', students));
    list.appendChild(more);
  }
}

// Allow the search box to use the new renderer
document.getElementById('search').addEventListener('input',function(){
  const q=this.value;
  if(q.length > 0 && !_stuListOpen) toggleStudentList(true);
  _renderStudents(q, _allStudents);
});

function pick(s){
  G.stu=s;
  document.querySelectorAll('.stu-item').forEach(e=>{
    e.classList.toggle('active',e.dataset.sid===s.id);
  });
  // Fetch micro-predictions if not cached for this exam
  const ex = G.exam;
  if(!G.microPreds[ex]){
    fetch('http://localhost:8001/api/v1/data/predict?exam_type='+(ex==='jee'?'jee_main':ex)+'&year=2026&level=micro&top_n=200')
      .then(r=>r.ok?r.json():null).then(d=>{
        if(d&&d.predictions){ G.microPreds[ex]=d.predictions; _refreshDeepAnalysis(s); }
      }).catch(()=>{});
  }
  render(s);
}

function _refreshDeepAnalysis(s){
  const target=document.getElementById('deep-analysis-wrap');
  if(target && G.microPreds[G.exam]){
    target.innerHTML='';
    target.appendChild(_buildDeepContent(s, G.microPreds[G.exam]));
  }
}

/* ── Deep Analysis — 3-level drill-down (subject→chapter→micro-topic) ── */
function buildDeepAnalysis(s){
  const wrap=el('div','deep-section');
  wrap.id='deep-analysis-container';

  const hdr=el('div','section-hdr');
  hdr.innerHTML='<span style="font-size:.72rem;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--mt)">🎯 PRAJNA Deep Analysis</span>'
    +'<span style="font-size:.65rem;color:var(--mt);margin-left:8px">— Chapter → Micro-Topic × Your Performance × Exam Predictions</span>';
  wrap.appendChild(hdr);

  const content=el('div');
  content.id='deep-analysis-wrap';

  const preds=G.microPreds[G.exam];
  if(preds && preds.length){
    content.appendChild(_buildDeepContent(s, preds));
  } else {
    content.innerHTML='<div style="text-align:center;padding:24px;color:var(--mt);font-size:.8rem">'
      +'⏳ Loading PRAJNA micro-topic predictions…<br>'
      +'<span style="font-size:.7rem">Requires Intelligence API on port 8001</span></div>';
  }
  wrap.appendChild(content);
  return wrap;
}

function _buildDeepContent(s, preds){
  const SCOL={Physics:'#f59e0b',Chemistry:'#6c63ff',Biology:'#22c55e',Mathematics:'#a855f7',
              Botany:'#22c55e',Zoology:'#10b981'};
  const TREND_ICO={RISING:'↑',STABLE:'→',DECLINING:'↓',NEW:'★'};
  const frag=document.createDocumentFragment();

  // Group predictions by subject → chapter → micro_topics
  const tree={};
  preds.forEach(p=>{
    if(p.syllabus_status==='REMOVED') return;
    const subj=p.subject, ch=p.chapter||p.normalized_chapter||'Other';
    if(!tree[subj]) tree[subj]={};
    if(!tree[subj][ch]) tree[subj][ch]={preds:[], prob:0, expQ:0, trend:'STABLE', conf:0};
    tree[subj][ch].preds.push(p);
    tree[subj][ch].prob=Math.max(tree[subj][ch].prob, p.appearance_probability||0);
    tree[subj][ch].expQ+=(p.expected_questions||0);
    if((p.appearance_probability||0)>tree[subj][ch].prob) tree[subj][ch].trend=p.trend_direction||'STABLE';
    tree[subj][ch].conf=Math.max(tree[subj][ch].conf, p.confidence_score||0);
  });

  // Compute ROI for each micro-topic
  function _stuAcc(name){
    const cd=s.chapters&&s.chapters[name];
    if(cd) return cd[0];
    // Fallback: check if it matches a subject name
    const sd=s.subjects&&s.subjects[name];
    if(sd) return sd.acc||0;
    return null;
  }
  function _roi(stuAcc, prob, conf){
    if(stuAcc===null) return 0;
    return (1 - stuAcc/100) * (prob||0) * Math.max(conf||0, 0.5);
  }
  function _roiClass(r){ return r>0.4?'roi-crit':r>0.25?'roi-focus':r>0.1?'roi-review':'roi-ok'; }
  function _roiLabel(r){ return r>0.4?'⚠ CRITICAL':r>0.25?'⚡ FOCUS':r>0.1?'📘 REVIEW':'✓ OK'; }

  // Collect all micro ROIs for summary
  let allMicros=[];
  for(const subj in tree){
    for(const ch in tree[subj]){
      tree[subj][ch].preds.forEach(p=>{
        const mt=p.micro_topic||p.chapter;
        const acc=_stuAcc(mt)??_stuAcc(ch)??(_stuAcc(subj));
        const roi=_roi(acc, p.appearance_probability, p.confidence_score);
        allMicros.push({name:mt, chapter:ch, subject:subj, acc:acc, prob:p.appearance_probability, roi:roi});
      });
    }
  }
  allMicros.sort((a,b)=>b.roi-a.roi);

  // Summary card
  const crit=allMicros.filter(m=>m.roi>0.4).length;
  const focus=allMicros.filter(m=>m.roi>0.25&&m.roi<=0.4).length;
  const ok=allMicros.filter(m=>m.roi<=0.25).length;
  const top3=allMicros.slice(0,3);

  const summary=el('div','deep-summary');
  summary.innerHTML=`<div class="deep-summary-title">🎯 PRAJNA Study Priority Summary — ${allMicros.length} micro-topics analyzed</div>
    <div class="deep-summary-counts">
      <span class="deep-cnt" style="color:#ff6b6b">⚠ ${crit} CRITICAL</span>
      <span class="deep-cnt" style="color:#f59e0b">⚡ ${focus} FOCUS</span>
      <span class="deep-cnt" style="color:#22c55e">✓ ${ok} on track</span>
    </div>
    <div style="font-size:.72rem;color:var(--mt);margin-bottom:6px;font-weight:600">Top actions:</div>
    <ol class="deep-actions">${top3.map(m=>
      `<li><strong style="color:${SCOL[m.subject]||'#818cf8'}">${m.name}</strong> `
      +`<span style="color:var(--mt)">(${m.subject})</span> — `
      +`Your: <strong style="color:${m.acc!==null&&m.acc<50?'#ff6b6b':'#22c55e'}">${m.acc!==null?m.acc.toFixed(0)+'%':'?'}</strong> · `
      +`PRAJNA: <strong style="color:#a5b4fc">${(m.prob*100).toFixed(0)}%</strong></li>`
    ).join('')}</ol>`;
  frag.appendChild(summary);

  // Subject-level drill-down
  const subjOrder=Object.keys(tree).sort((a,b)=>{
    // Weakest subject first
    const aAcc=s.subjects&&s.subjects[a]?s.subjects[a].acc:100;
    const bAcc=s.subjects&&s.subjects[b]?s.subjects[b].acc:100;
    return aAcc-bAcc;
  });

  subjOrder.forEach(subj=>{
    const sc=SCOL[subj]||'#818cf8';
    const chapters=tree[subj];
    const chCount=Object.keys(chapters).length;
    const subjAcc=_stuAcc(subj)??(s.subjects&&s.subjects[subj]?s.subjects[subj].acc:null);
    const totalMicros=Object.values(chapters).reduce((t,c)=>t+c.preds.length,0);

    const subjEl=document.createElement('details');
    subjEl.className='deep-subj';
    subjEl.open=true;

    const subjSum=document.createElement('summary');
    subjSum.innerHTML=`<span class="deep-subj-dot" style="background:${sc}"></span>`
      +`<span>${subj}</span>`
      +`<span style="font-size:.7rem;font-weight:400;color:var(--mt)">Your: <strong style="color:${subjAcc!==null&&subjAcc<50?'#ff6b6b':sc}">${subjAcc!==null?subjAcc.toFixed(0)+'%':'—'}</strong></span>`
      +`<span class="deep-subj-meta">${chCount} chapters · ${totalMicros} micro-topics</span>`;
    subjEl.appendChild(subjSum);

    const subjBody=el('div','deep-subj-body');

    // Sort chapters by max micro ROI descending
    const chEntries=Object.entries(chapters).sort((a,b)=>{
      const aMax=Math.max(...a[1].preds.map(p=>_roi(_stuAcc(p.micro_topic||p.chapter)??_stuAcc(a[0])??subjAcc, p.appearance_probability, p.confidence_score)));
      const bMax=Math.max(...b[1].preds.map(p=>_roi(_stuAcc(p.micro_topic||p.chapter)??_stuAcc(b[0])??subjAcc, p.appearance_probability, p.confidence_score)));
      return bMax-aMax;
    });

    chEntries.forEach(([ch, chData])=>{
      const chAcc=_stuAcc(ch)??subjAcc;
      const chProb=(chData.prob*100).toFixed(0);
      const chExpQ=chData.expQ.toFixed(1);
      const chTrend=TREND_ICO[chData.trend]||'→';

      const chEl=document.createElement('details');
      chEl.className='deep-ch';

      const chSum=document.createElement('summary');
      chSum.innerHTML=`<span class="deep-ch-name">${ch}</span>`
        +`<span style="font-size:.68rem;color:var(--mt)">Your: <strong style="color:${chAcc!==null&&chAcc<50?'#ff6b6b':'#22c55e'}">${chAcc!==null?chAcc.toFixed(0)+'%':'—'}</strong></span>`
        +`<span class="deep-ch-prob" style="color:${sc}">${chProb}%</span>`
        +`<span class="deep-ch-meta">~${chExpQ}Q · ${chTrend}</span>`;
      chEl.appendChild(chSum);

      const chBody=el('div','deep-ch-body');

      // Signal badges
      if(chData.preds[0]&&chData.preds[0].signal_breakdown){
        const sigDiv=el('div','deep-ch-signals');
        const sig=chData.preds[0].signal_breakdown;
        for(const[k,v] of Object.entries(sig)){
          const val=typeof v==='object'?v.value:v;
          if(val>0){
            const badge=el('span','deep-sig');
            badge.innerHTML=`${k.replace(/_/g,' ')}: <strong>${(typeof val==='number'?val.toFixed(2):val)}</strong>`;
            sigDiv.appendChild(badge);
          }
        }
        chBody.appendChild(sigDiv);
      }

      // Micro-topic rows
      const sortedMicros=[...chData.preds].sort((a,b)=>{
        const aRoi=_roi(_stuAcc(a.micro_topic||a.chapter)??chAcc, a.appearance_probability, a.confidence_score);
        const bRoi=_roi(_stuAcc(b.micro_topic||b.chapter)??chAcc, b.appearance_probability, b.confidence_score);
        return bRoi-aRoi;
      });

      sortedMicros.forEach(p=>{
        const mt=p.micro_topic||p.chapter;
        const mtAcc=_stuAcc(mt)??chAcc;
        const mtProb=(p.appearance_probability||0);
        const roi=_roi(mtAcc, mtProb, p.confidence_score);
        const rc=_roiClass(roi);
        const rl=_roiLabel(roi);

        const row=el('div','deep-micro');
        row.innerHTML=`<span class="deep-micro-name">${mt}</span>`
          +`<span class="deep-micro-acc" style="color:${mtAcc!==null&&mtAcc<50?'#ff6b6b':'#22c55e'}">${mtAcc!==null?mtAcc.toFixed(0)+'%':'—'}</span>`
          +`<span class="deep-micro-prob" style="color:${sc}">${(mtProb*100).toFixed(0)}%</span>`
          +`<span class="deep-micro-roi ${rc}">${rl}</span>`;
        chBody.appendChild(row);
      });

      chEl.appendChild(chBody);
      subjBody.appendChild(chEl);
    });

    subjEl.appendChild(subjBody);
    frag.appendChild(subjEl);
  });

  const wrapper=el('div');
  wrapper.appendChild(frag);
  return wrapper;
}

/* ── Chapter Performance Panel ── */
function buildHeatmap(s){
  const SUBJ_COLOR = {
    Botany:'#22c55e', Zoology:'#10b981',
    Chemistry:'#06b6d4', Physics:'#f59e0b', Mathematics:'#a855f7',
  };
  const LV_LABEL = {M:'Mastered',S:'Strong',D:'Developing',W:'Weak',C:'Critical'};
  const LV_COLOR = {M:'#22c55e',S:'#84cc16',D:'#f59e0b',W:'#f97316',C:'#ef4444'};

  const CHAP_MAP = G.exam === 'neet' ? NEET_MAP : JEE_MAP;

  const c = mkCard('📊 Chapter Performance');
  const note = el('div','note');
  note.appendChild(txt('Accuracy per chapter, grouped by subject. Sorted weakest-first. Trend: ↑ improving · ↓ declining · → stable.'));
  c.appendChild(note);

  const chapters = s.chapters || {};

  // Group chapters using exact lookup table — no guessing
  const subjMap = {};
  Object.entries(chapters).forEach(([chap, info]) => {
    const subj = CHAP_MAP[chap] || 'Other';
    if(!subjMap[subj]) subjMap[subj]=[];
    subjMap[subj].push({chap, info});
  });

  // Sort each subject's chapters by accuracy (weakest first for action focus)
  Object.values(subjMap).forEach(arr => arr.sort((a,b) => a.info[0]-b.info[0]));

  const grid = el('div','chperf-grid');

  Object.entries(subjMap).sort().forEach(([subj, chapList]) => {
    const sc = SUBJ_COLOR[subj] || '#6366f1';
    const avgSubj = chapList.reduce((s,x)=>s+x.info[0],0) / (chapList.length||1);

    const panel = el('div','chperf-subj');
    panel.style.borderTop = `3px solid ${sc}`;

    // Header (clickable toggle)
    const hdr = el('div','chperf-subj-hdr');
    const titleEl = el('span','chperf-subj-title');
    titleEl.style.color = sc;
    titleEl.appendChild(txt(subj));
    const metaEl = el('span','chperf-subj-meta');
    metaEl.appendChild(txt(`${chapList.length} chapters · avg ${avgSubj.toFixed(0)}%`));
    const chev = el('span','chperf-subj-chevron');
    chev.appendChild(txt('▾'));
    hdr.appendChild(titleEl);
    hdr.appendChild(metaEl);
    hdr.appendChild(chev);

    const body = el('div','chperf-subj-body');

    chapList.forEach(({chap, info}) => {
      const [avgAcc, lvCode] = info;
      const lc = LV_COLOR[lvCode] || '#94a3b8';
      const ll = LV_LABEL[lvCode] || 'Developing';

      // Trend: use seed-stable diff between first-3 and last-3 synthetic exams
      const seed1 = (chap.length*7+1*13)%21-10;
      const seed10 = (chap.length*7+10*13)%21-10;
      const trendDiff = seed10 - seed1;
      const trendArrow = trendDiff > 3 ? '↑' : trendDiff < -3 ? '↓' : '→';
      const trendColor = trendDiff > 3 ? '#22c55e' : trendDiff < -3 ? '#ef4444' : '#94a3b8';

      const row = el('div','chperf-row');

      const nameEl = el('span','chperf-name');
      nameEl.appendChild(txt(chap));
      nameEl.title = chap;

      const barWrap = el('div','chperf-bar-wrap');
      const bar = el('div','chperf-bar');
      bar.style.width = avgAcc.toFixed(0)+'%';
      bar.style.background = lc;
      barWrap.appendChild(bar);

      const pctEl = el('span','chperf-pct');
      pctEl.style.color = lc;
      pctEl.appendChild(txt(avgAcc.toFixed(0)+'%'));

      const badge = el('span','chperf-badge');
      badge.style.background = lc+'22';
      badge.style.color = lc;
      badge.style.border = `1px solid ${lc}44`;
      badge.appendChild(txt(ll));

      const trendEl = el('span','chperf-trend');
      trendEl.style.color = trendColor;
      trendEl.appendChild(txt(trendArrow));

      row.appendChild(nameEl);
      row.appendChild(barWrap);
      row.appendChild(pctEl);
      row.appendChild(badge);
      row.appendChild(trendEl);
      body.appendChild(row);
    });

    // Toggle collapse
    hdr.addEventListener('click', () => {
      const open = body.style.display !== 'none';
      body.style.display = open ? 'none' : '';
      chev.textContent = open ? '▸' : '▾';
    });

    panel.appendChild(hdr);
    panel.appendChild(body);
    grid.appendChild(panel);
  });

  c.appendChild(grid);
  return c;
}

/* ── Insights ── */
function buildInsights(s){
  const c=mkCard('🎯 PRAJNA Personalized Insights');
  const m=s.metrics;

  const weakestSubj=subjectNames.reduce((a,b)=>((subjects[a]||{}).acc||0)<((subjects[b]||{}).acc||0)?a:b,subjectNames[0]||'');
  const strongestSubj=subjectNames.reduce((a,b)=>((subjects[a]||{}).acc||0)>((subjects[b]||{}).acc||0)?a:b,subjectNames[0]||'');
  const topFocus=(s.slm_focus||[])[0];

        ?[['Rapidly improving! ','#22c55e',true],['Gaining ~'+(trend).toFixed(1)+'% per exam. Excellent momentum — maintain your study schedule.','']]

    {

      parts:[
        ['Strongest: ',''],
        [strongestSubj,'#22c55e',true],

        [weakestSubj,'#ef4444',true],
        [' ('+((subjects[weakestSubj]||{}).acc||0).toFixed(0)+'%) — highest score-gain potential.',''],
      ],
    },
    {
      label:'Prajna Recommendation',
      parts: topFocus
        ?[['Study now: ',''],
          [topFocus.chapter,'#a855f7',true],
          ['. You are at '+topFocus.accuracy.toFixed(0)+'% but Prajna rates it '+topFocus.slm_importance+'% likely to appear. Fixing this chapter could add significant marks.',''],
        ]
        :[['Excellent! ','#22c55e',true],['Strong coverage across all high-Prajna-priority chapters. Focus on revision and mock practice.','']],
    },
    {
      label:'Exam Readiness',
      parts:(()=>{
        const slope = trend;
        const rawScore = Math.min(100,
          (m.latest_percentage||0)*0.45 +
          cons*0.25 +
          (slope>0?Math.min(slope*30,20):0) +
          10 // base
        );
        const readPct = Math.round(rawScore);
        if(readPct>=75)
          return [['Exam-ready! ','#22c55e',true],['PRAJNA readiness score: '+readPct+'/100. Trajectory, consistency and score all align. Keep this momentum into the real exam.','']];
        if(readPct>=50)
          return [['Getting there — ','#f59e0b',true],['readiness score '+readPct+'/100. Main gaps: '+(cons<60?'inconsistency':'')+(cons<60&&slope<=0?' & ':'')+(slope<=0?'declining trend':'')+(cons>=60&&slope>0?'widen your chapter coverage':'')+'. 6 focused weeks can bridge this.','']];
        return [['Not exam-ready yet ','#ef4444',true],['(score: '+readPct+'/100). Prioritise daily study blocks, fix critical weak chapters, and run 2 full mocks per week.','']]
      })(),
    },
    {
      label:'Score-Gain Potential',
      parts:(()=>{
        const topItems=(s.slm_focus||[]).slice(0,3);
        if(!topItems.length)
          return [['Optimised! ','#22c55e',true],['No critical weak zones. Gains now come from speed and accuracy under exam conditions.','']];
        const estGain=topItems.reduce((acc,f)=>{
          // Each chapter in NEET ≈ 4–5 Qs; accuracy gap × questions ≈ raw mark gain
          const qPerChap=4; const gap=Math.max(0,65-(f.accuracy||0));
          return acc + Math.round((gap/100)*qPerChap*4); // *4 marks/correct
        },0);
        return [['Fix your top 3 focus chapters ','',''],
          ['('+topItems.map(f=>f.chapter).join(', ')+')','#a855f7',true],
          [' — estimated ','',''],
          ['+'+estGain+' marks','#22c55e',true],
          [' gain if brought to 65% accuracy. That\'s a significant rank jump.','',''],
        ];
      })(),
    },
  ];

  const row=el('div','insight-row');
  row.style.gridTemplateColumns='repeat(3,1fr)';
  insights.forEach(ins=>{
    const chip=el('div','ins-chip');
    const lbl=el('div','ins-lbl'); lbl.appendChild(txt(ins.label)); chip.appendChild(lbl);
    const body=el('div','ins-txt');
    ins.parts.forEach(([t,color,bold])=>{
      if(bold){
        const sp=el('span','ins-strong');
        if(color) sp.style.color=color;
        sp.appendChild(txt(t)); body.appendChild(sp);
      } else {
        body.appendChild(txt(t));
      }
    });
    chip.appendChild(body);
    row.appendChild(chip);
  });
  c.appendChild(row);
  return c;
}

/* ── Predictions Panel ── */
function buildPredictionsPanel(s){
  const card=el('div','pred-card');

  // Header
  const hdr=el('div','pred-hdr');
  const titleEl=el('span');
  titleEl.style.cssText='font-size:.95rem;font-weight:700;background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent';
  titleEl.appendChild(txt('📡 PRAJNA Predictions — 2026 Exam Outlook'));
  hdr.appendChild(titleEl);
  const statusEl=el('span'); statusEl.id='pred-status-'+s.id;
  statusEl.style.cssText='font-size:.71rem;color:var(--mt)';
  statusEl.appendChild(txt('Fetching…'));
  hdr.appendChild(statusEl);
  card.appendChild(hdr);

  const noteEl=el('div','note');
  noteEl.appendChild(txt('PRAJNA v3 chapter predictions for '+(G.exam==='neet'?'NEET':'JEE')+' 2026. ★ = overlaps your weak areas.'));
  card.appendChild(noteEl);

  // Tabs
  const tabs=el('div','pred-tabs');
  let _activeTab='all', _allPreds=[], _weakPreds=[], _risingPreds=[];
  const weakSet=new Set((s.slm_focus||[]).map(f=>(f.chapter||'').toLowerCase()));
  const exam=G.exam==='neet'?'neet':'jee_main';
  const listId='pred-list-'+s.id;

  function _renderPredList(){
    const lst=document.getElementById(listId); if(!lst) return;
    lst.textContent='';
    const src=_activeTab==='weak'?_weakPreds:_activeTab==='rising'?_risingPreds:_allPreds;
    if(!src.length){
      const em=el('div'); em.style.cssText='color:var(--mt);font-size:.82rem;padding:14px;text-align:center';
      em.appendChild(txt(_activeTab==='weak'?'No overlap with your weak chapters — great signal coverage! ✓':'No data yet.')); lst.appendChild(em); return;
    }
    // Column headers
    const colHdr=el('div','pred-col-hdr');
    ['Chapter','Probability','Exp. Qs','Trend'].forEach(h=>{
      const lbl=el('span','pred-col-lbl'); lbl.appendChild(txt(h)); colHdr.appendChild(lbl);
    });
    lst.appendChild(colHdr);
    src.slice(0,20).forEach(p=>{
      const isMatch=weakSet.has((p.chapter||p.topic||'').toLowerCase());
      const prob=p.appearance_probability||0;
      const trend=((p.trend_direction||'')).toUpperCase();
      const trendUp=trend==='RISING'; const trendDown=trend==='FALLING'||trend==='DECREASING';
      const probColor=prob>=0.70?'#22c55e':prob>=0.45?'#f59e0b':'#6366f1';
      const row=el('div','pred-row'+(isMatch?' match':''));
      // Chapter
      const chap=el('div','pred-chapter');
      const cn=el('div','pred-ch-name'); cn.appendChild(txt(p.chapter||p.topic||'—')); cn.title=p.chapter||'';
      if(isMatch){const mb=el('span','pred-match-badge');mb.appendChild(txt('★ weak'));cn.appendChild(mb);}
      const cs=el('div','pred-ch-sub'); cs.appendChild(txt(p.subject||''));
      chap.appendChild(cn); chap.appendChild(cs); row.appendChild(chap);
      // Probability bar + %
      const pc=el('div','pred-prob-col');
      const bw=el('div','pred-prob-bar'); const bf=el('div','pred-prob-fill');
      bf.style.background=probColor; bw.appendChild(bf);
      const pp=el('span','pred-prob-pct'); pp.style.color=probColor;
      pp.appendChild(txt(Math.round(prob*100)+'%'));
      pc.appendChild(bw); pc.appendChild(pp); row.appendChild(pc);
      // Expected questions
      const qEl=el('div','pred-qs'); qEl.appendChild(txt((p.expected_questions||0).toFixed(1)+'Q')); row.appendChild(qEl);
      // Trend
      const tEl=el('div','pred-trend');
      tEl.style.color=trendUp?'#22c55e':trendDown?'#ef4444':'#94a3b8';
      tEl.appendChild(txt(trendUp?'↑ Rising':trendDown?'↓ Falling':'→ Stable'));
      row.appendChild(tEl);
      lst.appendChild(row);
      requestAnimationFrame(()=>{ bf.style.width=Math.round(prob*100)+'%'; });
    });
  }

  function _setTab(tid){
    _activeTab=tid;
    tabs.querySelectorAll('.pred-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tid));
    _renderPredList();
  }

  [['all','All Chapters'],['weak','Your Weak ★'],['rising','Rising ↑']].forEach(([id,lbl])=>{
    const t=el('button','pred-tab'); t.dataset.tab=id; t.appendChild(txt(lbl));
    if(id==='all') t.classList.add('active');
    t.addEventListener('click',()=>_setTab(id)); tabs.appendChild(t);
  });
  card.appendChild(tabs);

  const list=el('div','pred-list'); list.id=listId;
  for(let i=0;i<5;i++){const sk=el('div','pred-row');sk.style.cssText='background:linear-gradient(90deg,#ffffff04 25%,#ffffff08 50%,#ffffff04 75%);background-size:200% 100%;animation:pulse 1.5s infinite;height:44px;border-radius:8px';list.appendChild(sk);}
  card.appendChild(list);

  fetch('http://localhost:8001/api/v1/data/predict?exam_type='+exam+'&year=2026&top_n=40&level=chapter')
    .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }).then(d=>{
      const stEl=document.getElementById('pred-status-'+s.id);
      if(stEl){stEl.textContent='';stEl.appendChild(txt('Live · '+((d.predictions||[]).length)+' chapters ranked'));}
      _allPreds=(d.predictions||[]).sort((a,b)=>(b.appearance_probability||0)-(a.appearance_probability||0));
      _weakPreds=_allPreds.filter(p=>weakSet.has((p.chapter||p.topic||'').toLowerCase()));
      _risingPreds=_allPreds.filter(p=>((p.trend_direction||'')).toUpperCase()==='RISING');
      // Update tab labels with counts
      tabs.querySelectorAll('.pred-tab').forEach(t=>{
        const id=t.dataset.tab;
        const cnt=id==='weak'?_weakPreds.length:id==='rising'?_risingPreds.length:_allPreds.length;
        const lbl=id==='all'?'All Chapters':id==='weak'?'Your Weak ★':'Rising ↑';
        t.textContent=''; t.appendChild(txt(lbl+' ('+cnt+')'));
      });
      _renderPredList();
    }).catch(()=>{
      const stEl=document.getElementById('pred-status-'+s.id);
      if(stEl){stEl.textContent='';stEl.appendChild(txt('API offline'));}
      const lst=document.getElementById(listId);
      if(lst){lst.textContent='';const em=el('div');em.style.cssText='color:var(--mt);font-size:.82rem;padding:14px';em.appendChild(txt('Could not reach Intelligence API on localhost:8001. Run: python3 intelligence/run_api.py'));lst.appendChild(em);}
    });

  return card;
}

/* ── Topic Deep Dive ── */

  hdr.appendChild(titleEl);
  const badgeEl=el('span');
  badgeEl.style.cssText='font-size:.7rem;color:var(--mt);padding:2px 10px;border-radius:12px;background:#ffffff08;border:1px solid #ffffff10';
  badgeEl.appendChild(txt('48yr historical data'));
  hdr.appendChild(badgeEl);
  card.appendChild(hdr);

  const noteEl=el('div','note');
  noteEl.appendChild(txt('Breakdown of your top-priority weak chapters. See which micro-topics appear most in exams.'));
  card.appendChild(noteEl);

  const grid=el('div','tdive-grid');
  card.appendChild(grid);

  const focusChaps=(s.slm_focus||[]).slice(0,4);
  const exam=G.exam==='neet'?'neet':'jee_main';
  const CHAP_MAP=G.exam==='neet'?NEET_MAP:JEE_MAP;
  const SC={Botany:'#22c55e',Zoology:'#10b981',Chemistry:'#06b6d4',Physics:'#f59e0b',Mathematics:'#a855f7',Other:'#6366f1'};

  if(!focusChaps.length){
    const em=el('div'); em.style.cssText='color:#22c55e;padding:16px;font-size:.84rem;text-align:center';
    em.appendChild(txt('No weak chapters identified — excellent coverage! 🎉')); grid.appendChild(em);
    return card;
  }

  focusChaps.forEach(fItem=>{
    const chap=fItem.chapter;
    const subj=CHAP_MAP[chap]||'Other';
    const subjColor=SC[subj]||'#6366f1';
    const acc=fItem.accuracy||0;
    const chapKey='tdive-'+s.id+'-'+chap.replace(/[\s\/]+/g,'_').slice(0,30);

    const item=el('div','tdive-item');
    item.style.borderTopColor=subjColor;

    // Item header
    const itmHdr=el('div','tdive-item-hdr');
    const titleWrap=el('div'); titleWrap.style.minWidth='0'; titleWrap.style.flex='1';
    const itmTitle=el('div','tdive-item-title'); itmTitle.appendChild(txt(chap)); itmTitle.title=chap;
    const subjBadge=el('div'); subjBadge.style.cssText='font-size:.68rem;color:'+subjColor+';margin-top:2px;font-weight:600';
    subjBadge.appendChild(txt(subj));
    titleWrap.appendChild(itmTitle); titleWrap.appendChild(subjBadge);
    const accBadge=el('span','tdive-acc-badge');
    accBadge.style.background=lColor(fItem.level)+'22'; accBadge.style.color=lColor(fItem.level);
    accBadge.appendChild(txt('You: '+acc.toFixed(0)+'%'));
    itmHdr.appendChild(titleWrap); itmHdr.appendChild(accBadge);
    item.appendChild(itmHdr);

    // Stats row (filled async)
    const statsRow=el('div','tdive-stats-row'); statsRow.id=chapKey+'-stats';
    const loadEl=el('div','tdive-loading'); loadEl.appendChild(txt('Loading data…'));
    statsRow.appendChild(loadEl); item.appendChild(statsRow);

    // Subtopics
    const subsLbl=el('div','tdive-subs-lbl'); subsLbl.appendChild(txt('Key Sub-Topics (by exam frequency)'));
    item.appendChild(subsLbl);
    const subsList=el('div'); subsList.id=chapKey+'-subs';
    const load2=el('div','tdive-loading'); load2.appendChild(txt('Loading…'));
    subsList.appendChild(load2); item.appendChild(subsList);

    // Type chips
    const typesWrap=el('div','tdive-types'); typesWrap.id=chapKey+'-types';
    item.appendChild(typesWrap);

    grid.appendChild(item);

    // Async fetch — try exact chapter name first, then a fuzzy fallback via topics-list
    fetch('http://localhost:8001/api/v1/data/topic-deep-dive?topic='+encodeURIComponent(chap)+'&exam_type='+exam)
      .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }).then(d=>{
        // ── Stats ──
        const sr=document.getElementById(chapKey+'-stats');
        if(sr){
          sr.textContent='';
          const total=d.total_questions||0;
          const firstY=d.first_year||null;
          const lastY=d.last_year||null;
          const span=d.span_years||0;
          [[String(total),'Total Qs','#6366f1'],[firstY?String(firstY):'—','First Year','#94a3b8'],[lastY?String(lastY):'—','Last Year',subjColor],[span?span+'yr':'—','History','#f59e0b']].forEach(([val,lbl,color])=>{
            const stat=el('div','tdive-stat');
            const vEl=el('div','tdive-stat-val'); vEl.style.color=color; vEl.appendChild(txt(val));
            const lEl=el('div','tdive-stat-lbl'); lEl.appendChild(txt(lbl));
            stat.appendChild(vEl); stat.appendChild(lEl); sr.appendChild(stat);
          });
        }
        // ── Subtopics ──
        const sl=document.getElementById(chapKey+'-subs');
        if(sl){
          sl.textContent='';
          const subs=(d.subtopic_counts||[]).slice(0,5);
          const maxCnt=subs.reduce((m,x)=>Math.max(m,x.count||x.micro_topic_count||0),1);
          if(!subs.length){
            const em=el('div','tdive-loading'); em.appendChild(txt('No sub-topic data in DB for this chapter.')); sl.appendChild(em);
          } else {
            subs.forEach(sub=>{
              const nm=sub.micro_topic||sub.subtopic||sub.topic||String(sub);
              const cnt=sub.count||sub.micro_topic_count||0;
              const pct=Math.round((cnt/maxCnt)*100);
              const row=el('div','tdive-sub-row');
              const nEl=el('div','tdive-sub-name'); nEl.appendChild(txt(nm)); nEl.title=nm;
              const bw=el('div','tdive-sub-bar-wrap');
              const bf=el('div','tdive-sub-bar'); bf.style.background=subjColor; bw.appendChild(bf);
              const cEl=el('div','tdive-sub-cnt'); cEl.appendChild(txt(cnt));
              row.appendChild(nEl); row.appendChild(bw); row.appendChild(cEl); sl.appendChild(row);
              requestAnimationFrame(()=>{ bf.style.width=pct+'%'; });
            });
          }
        }
        // ── Type distribution ──
        const tw=document.getElementById(chapKey+'-types');
        if(tw){
          tw.textContent='';
          const td=d.type_distribution||{};
          const entries=Object.entries(td);
          if(entries.length){
            entries.forEach(([type,cnt])=>{
              const chip=el('span','tdive-type-chip'); chip.appendChild(txt(type+': '+cnt)); tw.appendChild(chip);
            });
          }
        }
      }).catch(err=>{
        const sr=document.getElementById(chapKey+'-stats');
        const msg=(err&&err.message||'').includes('404')
          ?'Chapter name not in exam DB (slight name mismatch)'
          :'API offline — run intelligence/run_api.py';
        if(sr){sr.textContent='';const em=el('div','tdive-loading');em.appendChild(txt(msg));sr.appendChild(em);}
      });
  });

  return card;
}

  ];

  const sugg=el('div','cp-suggestions');
  suggestions.forEach(q=>{
    const pill=el('span','cp-pill');
    pill.appendChild(txt(q));
    pill.addEventListener('click',()=>{
      const inp=wrap.querySelector('.cp-input');
      if(inp) inp.value=q;
    });
    sugg.appendChild(pill);
  });
  wrap.appendChild(sugg);

  // Input row
  const row=el('div','cp-row'); row.style.marginTop='10px';
  const inp=el('input','cp-input');
  inp.type='text';
  inp.placeholder='Ask anything about '+s.name+'\'s performance…';
  row.appendChild(inp);
  const btn=el('button','cp-btn');
  btn.appendChild(txt('Ask →'));
  row.appendChild(btn);
  wrap.appendChild(row);

  // Answer box
  const ansEl=el('div','cp-answer'); wrap.appendChild(ansEl);
  const metaEl=el('div','cp-meta'); wrap.appendChild(metaEl);

  function ask(){
    const q=inp.value.trim();
    if(!q) return;
    // Enrich question with student context
    const weakChapters=(s.slm_focus||[]).slice(0,3).map(f=>f.chapter).join(', ');
    const contextQ='Student: '+s.name+' ('+s.id+'), '+s.target+' aspirant, latest score: '+
      (s.metrics.latest_percentage||0).toFixed(1)+'%, rank: #'+(s.metrics.latest_rank||'—')+
      ', weakest chapters: '+weakChapters+'. Question: '+q;

    ansEl.style.display='block';
    metaEl.style.display='none';
    ansEl.textContent='Thinking…';

    fetch('http://localhost:8001/api/v1/copilot/ask',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({exam_type:G.exam==='neet'?'neet':'jee_main',target_year:new Date().getFullYear()+1,question:contextQ,persona:'student'}),
    })
    .then(r=>r.json())
    .then(d=>{
      let out=d.answer||'No answer returned.';
      if(d.follow_up_questions&&d.follow_up_questions.length)
        out+='\n\n💡 You might also ask:\n'+d.follow_up_questions.map(x=>'• '+x).join('\n');
      ansEl.textContent=out;
      metaEl.style.display='block';
      metaEl.textContent='';
      metaEl.appendChild(txt('Confidence: '+Math.round((d.confidence||0)*100)+'%  ·  '+d.request_id));
    })
    .catch(()=>{
      ansEl.textContent='Could not reach PRAJNA Intelligence API on localhost:8001. Run: python3 intelligence/run_api.py';
    });
  }

  btn.addEventListener('click',ask);
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') ask(); });
  return wrap;
}

/* ── Guide constants ── */
const STUDY_HOURS = {C:6, W:4, D:2.5, S:1, M:0.5};
const NEXT_LEVEL  = {C:'Weak', W:'Developing', D:'Strong', S:'Mastered', M:'–'};
const NEXT_THRESH = {C:25,    W:45,            D:65,       S:80,         M:100}; // must match pctLevel() boundaries
const STRATEGY = {
  C:{
    rising:   '🚨 Highest priority. Start with NCERT basics, then solve last 5-yr PYQs daily. This topic is gaining importance.',
    stable:   '🚨 Critical gap. Dedicate first study block daily. Focus on fundamentals before attempting numericals.',
    declining:'⚠️ Critical but declining. Secure basic marks with NCERT; don\'t over-invest.',
  },
  W:{
    rising:   '🔴 High ROI. Study theory first, then 30+ PYQs. Rising importance makes this a priority pick.',
    stable:   '🔴 Needs work. Structured 4h block: 1.5h theory → 1h formula drill → 1.5h PYQ practice.',
    declining:'🟠 Weak but declining. Aim for passing marks; redistribute time if overwhelmed.',
  },
  D:{
    rising:   '🟡 Good potential. Consistent practice will push you to Strong. Focus on high-frequency micro-topics.',
    stable:   '🟡 Developing. 2–3 timed mock sets per week will consolidate this chapter.',
    declining:'🟡 Declining trend. Maintain with weekly revision to stop the slide; redirect extra study time to higher-ROI chapters.',
  },
  S:{any:'🟢 Strong. Weekly maintenance revision and 1 mock test set is sufficient.'},
  M:{any:'✅ Mastered. Quick 30-min revision before exam. No major investment needed.'},
};
const SUBJ_COLOR = {Botany:'#22c55e',Zoology:'#10b981',Chemistry:'#06b6d4',Physics:'#f59e0b',Mathematics:'#a855f7'};

const _microCache = new Map();

function _trendLabel(chap){
  const seed1  = (chap.length*7 + 1*13)%21 - 10;
  const seed10 = (chap.length*7 + 10*13)%21 - 10;
  const diff   = seed10 - seed1;
  return diff > 3
    ? {dir:'rising',    label:'↑ Rising',    color:'#22c55e'}
    : diff < -3
    ? {dir:'declining', label:'↓ Declining', color:'#ef4444'}
    : {dir:'stable',    label:'→ Stable',    color:'#94a3b8'};
}

function _strategyText(level, trendDir){
  const s = STRATEGY[level] || STRATEGY['D'];
  return s[trendDir] || s['stable'] || s['any'] || '';
}

async function _fetchMicros(chap, exam){
  const key = exam+'|'+chap;
  if(_microCache.has(key)) return _microCache.get(key);
  try{
    const r = await fetch('http://localhost:8001/api/v1/data/topic-deep-dive?topic='+encodeURIComponent(chap)+'&exam_type='+exam);
    const d = await r.json();
    const micros = (d.micro_topics||[]).slice(0,3).map(m=>m.topic_name||m.name||String(m));
    const qcount = d.question_count || d.total || 0;
    const result = {micros, qcount};
    _microCache.set(key, result);
    return result;
  }catch(e){
    const result = {micros:[], qcount:0};
    _microCache.set(key, result);
    return result;
  }
}

/* ── Chapter Detail Card (lazy-loaded inside guide) ── */
function _buildDetailCard(detail, item, exam, trend){
  const lvColor = LC[item.lv] || '#94a3b8';
  const hours   = STUDY_HOURS[item.lv] || 2.5;
  const nextLv  = NEXT_LEVEL[item.lv]  || '–';
  const nextThr = NEXT_THRESH[item.lv] || 55;
  const gap     = Math.max(0, nextThr - item.acc);

  // Top stats row
  const topRow = el('div','guide-detail-top');
  [
    [hours+'h',     '⏱ Study Est.',  lvColor],
    [trend.label,   '📈 Trend',      trend.color],
    [gap > 0 ? '+'+gap.toFixed(0)+'% to '+nextLv : '✓ Peak', '🎯 Next Level', '#6366f1'],
  ].forEach(([val,lbl,color])=>{
    const stat = el('div','guide-detail-stat');
    const vEl  = el('div','guide-detail-stat-val'); vEl.style.color=color; vEl.appendChild(txt(val));
    const lEl  = el('div','guide-detail-stat-lbl'); lEl.appendChild(txt(lbl));
    stat.appendChild(vEl); stat.appendChild(lEl);
    topRow.appendChild(stat);
  });
  detail.appendChild(topRow);

  // Micro-topics (lazy)
  const microWrap = el('div','guide-micros');
  const microLbl  = el('div','guide-micro-label'); microLbl.appendChild(txt('Key Micro-Topics'));
  const microList = el('div','guide-micro-list');
  const skeleton  = el('span'); skeleton.style.cssText='color:var(--mt);font-size:.78rem';
  skeleton.appendChild(txt('Loading…'));
  microList.appendChild(skeleton);
  microWrap.appendChild(microLbl); microWrap.appendChild(microList);
  detail.appendChild(microWrap);

  // Strategy
  const strategy = el('div','guide-strategy');
  strategy.appendChild(txt(_strategyText(item.lv, trend.dir)));
  detail.appendChild(strategy);

  // Questions link
  const qlink = el('a','guide-qlink');
  qlink.appendChild(txt('See exam questions →'));
  qlink.href = 'http://localhost:8501';
  qlink.target = '_blank';
  detail.appendChild(qlink);

  // Async: fill micro-topics + update question count
  _fetchMicros(item.chap, exam).then(({micros, qcount})=>{
    microList.textContent = '';
    if(micros.length === 0){
      const em = el('span'); em.style.cssText='color:var(--mt);font-size:.78rem';
      em.appendChild(txt('No micro-topic data. Is the API running?'));
      microList.appendChild(em);
    } else {
      micros.forEach(m=>{
        const chip = el('span','guide-micro-chip'); chip.appendChild(txt(m));
        microList.appendChild(chip);
      });
    }
    if(qcount > 0){
      qlink.textContent = '';
      qlink.appendChild(txt('See '+qcount+' exam questions →'));
    }
  });
}

/* ── Full Subject-Wise Guide ── */
function buildFullGuide(s){
  const section  = el('div','guide-section');
  section.id     = 'guide-section';
  const CHAP_MAP = G.exam === 'neet' ? NEET_MAP : JEE_MAP;
  const exam     = G.exam === 'neet' ? 'neet'   : 'jee_main';

  // Build per-subject groups with priority scores
  const subjGroups = {};
  Object.entries(s.chapters||{}).forEach(([chap, info])=>{
    const subj = CHAP_MAP[chap];
    if(!subj) return;
    const [acc, lv, slmImp] = info;
    const priority = (100 - acc) * ((slmImp||0) / 100);
    if(!subjGroups[subj]) subjGroups[subj]=[];
    subjGroups[subj].push({chap, acc, lv: (lv||'D')[0], slmImp: slmImp||0, priority});
  });

  // Sort subjects by avg priority desc; sort chapters within subject by priority desc
  const subjList = Object.entries(subjGroups).map(([subj, items])=>{
    items.sort((a,b)=>b.priority-a.priority);
    const avgPriority = items.reduce((s,x)=>s+x.priority,0) / (items.length||1);
    const weakCount   = items.filter(x=>x.lv==='C'||x.lv==='W').length;
    const critCount   = items.filter(x=>x.lv==='C').length;
    const avgAcc      = items.reduce((s,x)=>s+x.acc,0) / (items.length||1);
    return {subj, items, avgPriority, weakCount, critCount, avgAcc};
  }).sort((a,b)=>b.avgPriority-a.avgPriority);

  if(subjList.length === 0){
    const em = el('div'); em.style.cssText='padding:20px;color:var(--mt);font-size:.83rem;text-align:center';
    em.appendChild(txt('No chapter data available for this student.'));
    section.appendChild(em);
    return section;
  }

  subjList.forEach(({subj, items, avgPriority, weakCount, critCount, avgAcc}, si)=>{
    const urgColor  = avgPriority > 35 ? '#ef4444' : avgPriority > 20 ? '#f59e0b' : '#22c55e';
    const urgLabel  = avgPriority > 35 ? 'Urgent'  : avgPriority > 20 ? 'Moderate' : 'On Track';
    const subjColor = SUBJ_COLOR[subj] || '#6366f1';

    const panel = el('div','guide-subj');
    panel.style.borderTop = '3px solid '+subjColor;

    // Subject header
    const hdr   = el('div','guide-subj-hdr');
    const urgDot = el('div','guide-subj-urgency');
    urgDot.style.background = urgColor;
    urgDot.style.boxShadow  = '0 0 6px '+urgColor+'88';

    const nameEl = el('div','guide-subj-name');
    nameEl.style.color = subjColor;
    nameEl.appendChild(txt(subj));

    const metaEl = el('div','guide-subj-meta');
    metaEl.appendChild(txt(items.length+' chapters · avg '+avgAcc.toFixed(0)+'% · '+weakCount+' weak · '+critCount+' critical · '));
    const urgSpan = el('span'); urgSpan.style.color=urgColor; urgSpan.style.fontWeight='700';
    urgSpan.appendChild(txt(urgLabel));
    metaEl.appendChild(urgSpan);

    const chev = el('span','guide-subj-chev');
    chev.appendChild(txt('▶'));

    hdr.appendChild(urgDot); hdr.appendChild(nameEl);
    hdr.appendChild(metaEl); hdr.appendChild(chev);

    // Subject body
    const body = el('div','guide-subj-body');

    items.forEach((item, idx)=>{
      const trend   = _trendLabel(item.chap);
      const lvColor = LC[item.lv] || '#94a3b8';

      // Chapter row
      const row = el('div','guide-ch-row');

      const rankEl = el('span','guide-ch-rank'); rankEl.appendChild(txt('#'+(idx+1)));

      const nameEl2 = el('div','guide-ch-name');
      nameEl2.appendChild(txt(item.chap)); nameEl2.title = item.chap;

      // Dual mini-bars: accuracy + Prajna importance
      const barsWrap = el('div','guide-ch-bars');
      [[item.acc, lvColor],[(item.slmImp||0)+'','#a855f7']].forEach(([val,color])=>{
        const br = el('div','guide-ch-bar-row');
        const t  = el('div','guide-ch-bar-track');
        const f  = el('div','guide-ch-bar-fill');
        f.style.width = (parseFloat(val)||0)+'%'; f.style.background = color;
        t.appendChild(f); br.appendChild(t); barsWrap.appendChild(br);
      });

      const badge = el('span','guide-ch-badge');
      badge.style.background = lvColor+'22'; badge.style.color = lvColor;
      badge.appendChild(txt('['+item.lv+']'));

      const chev2 = el('span','guide-ch-chev'); chev2.appendChild(txt('▶'));

      row.appendChild(rankEl); row.appendChild(nameEl2);
      row.appendChild(barsWrap); row.appendChild(badge); row.appendChild(chev2);

      // Detail card
      const detail = el('div','guide-ch-detail');
      let detailBuilt = false;

      row.addEventListener('click', ()=>{
        const open = detail.style.display !== 'none';
        detail.style.display = open ? 'none' : 'block';
        chev2.textContent = open ? '▶' : '▼';
        if(!open && !detailBuilt){
          detailBuilt = true;
          _buildDetailCard(detail, item, exam, trend);
        }
      });

      body.appendChild(row);
      body.appendChild(detail);
    });

    // Toggle subject panel open/close
    hdr.addEventListener('click', ()=>{
      const open = body.classList.contains('open');
      body.classList.toggle('open', !open);
      chev.textContent = open ? '▶' : '▼';
    });

    // Auto-open most urgent subject
    if(si === 0){
      body.classList.add('open');
      chev.textContent = '▼';
    }

    panel.appendChild(hdr); panel.appendChild(body);
    section.appendChild(panel);
  });

  return section;
}

/* ── Boot ── */
async function boot(){
  const params=new URLSearchParams(location.search);
  const examParam=params.get('exam');
  const idParam=params.get('id');

  // If a specific student ID is in the URL (came from org-dashboard),
  // switch to focused single-student mode — hide sidebar, full width
  if(idParam) document.body.setAttribute('data-focused','true');

  if(examParam==='jee'){
    G.exam='jee';
    document.getElementById('btn-neet').className='';
    document.getElementById('btn-jee').className='active';
  }
  const data=await loadData(G.exam);
  if(!data) return;
  buildList(data.students);
  const initial=idParam?(data.students.find(s=>s.id===idParam)||data.students[0]):data.students[0];
  pick(initial);
}
boot();
</script>

</button>

<script>
let _copilotOpen = false;

function toggleCopilot(){
  _copilotOpen = !_copilotOpen;
  const panel = document.getElementById('prajna-chat');
  if(_copilotOpen){
    _buildCopilotPanel(panel);
    panel.classList.add('open');
    const inp = panel.querySelector('.cp-float-inp');
    if(inp) setTimeout(()=>inp.focus(), 80);
  } else {
    panel.classList.remove('open');
    setTimeout(()=>{ panel.innerHTML=''; }, 230);
  }
}

function _buildCopilotPanel(panel){
  panel.innerHTML = '';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'cp-float-header';
  hdr.innerHTML = '<div><div class="cp-float-title">🤖 PRAJNA Copilot</div>'
    +'<div class="cp-float-sub">Student study advisor · Prajna NL</div></div>'
    +'<button class="cp-float-close" onclick="toggleCopilot()">✕</button>';
  panel.appendChild(hdr);

  // Body (messages)
  const body = document.createElement('div');
  body.className = 'cp-float-body';
  body.id = 'cp-float-body';

  // Welcome bubble
  _addMsg('Hi! Ask me anything about your preparation, weak chapters, or rank prediction.', 'bot', body);

  // Suggestion pills based on current student
  const s = G.stu;
  const topWeak = (s&&s.slm_focus||[])[0];
  const weakestSubj = s ? Object.entries(s.subjects||{}).sort((a,b)=>((a[1]||{}).acc||0)-((b[1]||{}).acc||0))[0] : null;
  const pills = [
    topWeak ? 'Why is '+topWeak.chapter+' weak and how do I fix it?' : 'What should I study first?',
    weakestSubj ? 'Give me a 2-week plan for '+weakestSubj[0] : 'How do I improve my score?',
    'Which topics should I revise first for '+(s&&s.target||'the exam')+'?',
    'Compare my trajectory to what a top-100 student needs.',
  ];
  const pillWrap = document.createElement('div');
  pillWrap.className = 'cp-pills';
  pills.forEach(q => {
    const p = document.createElement('button');
    p.className = 'cp-pill'; p.textContent = q;
    p.onclick = () => {
      const inp = document.getElementById('cp-float-inp');
      if(inp){ inp.value = q; inp.focus(); }
      pillWrap.style.display = 'none';
    };
    pillWrap.appendChild(p);
  });
  body.appendChild(pillWrap);
  panel.appendChild(body);

  // Input row
  const row = document.createElement('div');
  row.className = 'cp-float-inp-row';
  row.innerHTML = '<input class="cp-float-inp" id="cp-float-inp" placeholder="Ask anything about this student\'s performance…"/>'
    +'<button class="cp-float-send" id="cp-float-send" onclick="_askCopilot()">Ask →</button>';
  panel.appendChild(row);

  document.getElementById('cp-float-inp').addEventListener('keydown', e => { if(e.key==='Enter') _askCopilot(); });
}

function _addMsg(text, type, container){
  const b = document.createElement('div');
  b.className = 'cpb ' + type;
  b.textContent = text;
  const c = container || document.getElementById('cp-float-body');
  c.appendChild(b);
  c.scrollTop = c.scrollHeight;
  return b;
}

function _askCopilot(){
  const inp = document.getElementById('cp-float-inp');
  const btn = document.getElementById('cp-float-send');
  const q = (inp.value||'').trim();
  if(!q) return;
  inp.value = '';
  _addMsg(q, 'user');

  const s = G.stu;
  const weakChapters = (s&&s.slm_focus||[]).slice(0,3).map(f=>f.chapter).join(', ');
  const contextQ = s
    ? 'Student: '+s.name+' ('+s.id+'), '+s.target+' aspirant, latest score: '
      +(s.metrics.latest_percentage||0).toFixed(1)+'%, rank: #'+(s.metrics.latest_rank||'—')
      +', weakest chapters: '+weakChapters+'. Question: '+q
    : q;

  const thinking = _addMsg('Thinking…', 'thinking');
  btn.disabled = true;

  fetch('http://localhost:8001/api/v1/copilot/ask',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      exam_type: G.exam==='neet'?'neet':'jee_main',
      target_year: new Date().getFullYear()+1,
      question: contextQ,
      persona: 'student'
    })
  })
  .then(r=>r.json())
  .then(d=>{
    let ans = d.answer||'No answer returned.';
    if(d.follow_up_questions&&d.follow_up_questions.length)
      ans += '\n\n💡 You might also ask:\n'+d.follow_up_questions.map(x=>'• '+x).join('\n');
    thinking.className='cpb bot'; thinking.textContent=ans;
    const body=document.getElementById('cp-float-body');
    if(body) body.scrollTop=body.scrollHeight;
  })
  .catch(()=>{
    thinking.className='cpb bot';
    thinking.textContent='⚠️ Copilot offline. Run: python3 intelligence/run_api.py';
  })
  .finally(()=>{ btn.disabled=false; });
}
</script>
</body>
